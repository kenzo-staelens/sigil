name: Feature Request
description: Suggest an idea for Sigil
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you're trying to solve and the solution you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've thought about.

  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: Show how you imagine this feature would be used (e.g., a YAML snippet or Python code).
      render: yaml

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      multiple: true
      options:
        - YAML configuration
        - Argument parsing
        - Subcommand handling
        - Script loading/imports
        - argcomplete integration
        - Pluggable backends (JSON, TOML, etc.)
        - Documentation
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.