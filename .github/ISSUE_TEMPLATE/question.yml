name: Question / Support
description: Ask a question about using Sigil
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about how to use Sigil? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? Include any relevant configuration or code snippets.
      render: yaml

  - type: input
    id: version
    attributes:
      label: Sigil version
      description: Run `pip show sigil-cli` to check.