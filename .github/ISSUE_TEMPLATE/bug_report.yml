name: Bug Report
description: Report a problem with Sigil
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Create a YAML config with '...'
        2. Run 'mycli.py ...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Paste your YAML/JSON/TOML config files (or the relevant parts).
      render: yaml

  - type: textarea
    id: script
    attributes:
      label: Command script
      description: Paste the Python script that implements the failing command.
      render: python

  - type: input
    id: version
    attributes:
      label: Sigil version
      description: Run `pip show sigil-cli` and paste the version.
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Run `python --version`.
      placeholder: e.g. Python 3.10.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, logs, or screenshots about the problem here.