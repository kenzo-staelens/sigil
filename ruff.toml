
target-version = "py310"

line-length = 88

exclude = [
    ".venv",
    ".git",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]

ignore = []

# isort settings
[lint.isort]
known-first-party = ["sigil"]

# Formatter settings (same as Black)
[format]
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"